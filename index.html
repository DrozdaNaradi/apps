<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nástroje — Drozda Nářadí</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f2f2f7;
      --card: #ffffff;
      --border: #e5e5ea;
      --text: #1c1c1e;
      --text-secondary: #8e8e93;
      --accent: #D40000;
      --accent-light: #fff0f0;
      --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 12px rgba(0,0,0,0.04);
      --shadow-hover: 0 4px 16px rgba(0,0,0,0.1), 0 8px 28px rgba(0,0,0,0.07);
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ====== SCREENS ====== */
    .screen { display: none; }
    .screen.active { display: flex; }

    /* ====== LOGIN / SETUP ====== */
    #loginScreen, #setupScreen {
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .auth-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow);
    }

    .auth-logo {
      width: 56px;
      height: 56px;
      background: var(--accent);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      margin-bottom: 20px;
    }

    .auth-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.4px;
      margin-bottom: 4px;
    }

    .auth-sub {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 28px;
    }

    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .field-hint {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .field-group { margin-bottom: 16px; }

    input[type="text"],
    input[type="password"],
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, textarea:focus { border-color: var(--accent); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
      text-decoration: none;
    }

    .btn:hover { opacity: 0.88; }
    .btn:active { opacity: 0.76; }

    .btn-red { background: var(--accent); color: #fff; padding: 11px 20px; }
    .btn-red-full { width: 100%; padding: 12px; margin-top: 8px; }
    .btn-dark { background: var(--text); color: #fff; padding: 8px 18px; font-size: 13px; }
    .btn-ghost { background: var(--bg); color: var(--text); border: 1.5px solid var(--border); padding: 8px 14px; }
    .btn-ghost:hover { border-color: var(--text); opacity: 1; }
    .btn-icon-sm {
      width: 34px; height: 34px;
      background: var(--bg);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      transition: all 0.15s;
    }
    .btn-icon-sm:hover { background: var(--border); color: var(--text); }

    .error-msg { font-size: 13px; color: var(--accent); margin-top: 10px; min-height: 18px; }

    /* ====== HEADER ====== */
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      height: 60px;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon-box {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .header-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header-actions { display: flex; align-items: center; gap: 8px; }

    .btn-add-app {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 8px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-add-app:hover { opacity: 0.88; }

    /* ====== MAIN ====== */
    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px 24px 60px;
    }

    .section-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .apps-count-badge {
      font-size: 12px;
      color: var(--text-secondary);
      background: var(--card);
      border: 1px solid var(--border);
      padding: 2px 10px;
      border-radius: 20px;
    }

    /* ====== GRID ====== */
    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
    }

    /* ====== CARD ====== */
    .app-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.18s, transform 0.18s;
    }

    .app-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .app-icon-box {
      width: 46px; height: 46px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .app-num {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
      background: var(--bg);
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: 0.3px;
    }

    .app-name {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.2px;
      margin-bottom: 5px;
    }

    .app-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.55;
      flex: 1;
      margin-bottom: 16px;
    }

    .card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .app-date {
      font-size: 11px;
      color: var(--text-secondary);
    }

    /* ====== EMPTY STATE ====== */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
    }

    .empty-icon {
      width: 60px; height: 60px;
      background: var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      color: var(--text-secondary);
    }

    .empty-state h3 { font-size: 16px; margin-bottom: 6px; }
    .empty-state p { font-size: 13px; color: var(--text-secondary); }

    /* ====== MODAL ====== */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(5px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .overlay.open { display: flex; }

    .modal {
      background: var(--card);
      border-radius: var(--radius);
      width: 100%;
      max-width: 500px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.18);
      overflow: hidden;
    }

    .modal-lg { max-width: 540px; }

    .modal-head {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-head-title { font-size: 16px; font-weight: 700; }

    .modal-close {
      width: 26px; height: 26px;
      background: var(--bg);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      transition: background 0.15s;
    }

    .modal-close:hover { background: var(--border); }

    .modal-body { padding: 22px; }
    .modal-foot {
      padding: 14px 22px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    /* ====== DROP ZONE ====== */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 44px 20px;
      text-align: center;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 0.18s;
    }

    .drop-zone:hover, .drop-zone.over {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--accent);
    }

    .drop-zone h4 { font-size: 14px; font-weight: 600; margin: 10px 0 4px; color: inherit; }
    .drop-zone p { font-size: 12px; }

    /* ====== ANALYZING ====== */
    .state-center {
      text-align: center;
      padding: 50px 20px;
    }

    .spinner {
      width: 34px; height: 34px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .state-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .state-sub { font-size: 13px; color: var(--text-secondary); }

    /* ====== ICON PREVIEW ====== */
    .icon-preview-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: var(--bg);
      border-radius: var(--radius);
    }

    .icon-preview-box {
      width: 44px; height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon-preview-name { font-size: 13px; font-weight: 600; }
    .icon-preview-sub { font-size: 11px; color: var(--text-secondary); }

    /* ====== SETTINGS ====== */
    .settings-section { margin-bottom: 22px; }
    .settings-section-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .inline-row { display: flex; gap: 8px; align-items: center; }
    .inline-row input { flex: 1; }

    /* ====== TOAST ====== */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1c1c1e;
      color: #fff;
      padding: 9px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      z-index: 9999;
      transition: transform 0.28s ease;
      white-space: nowrap;
      pointer-events: none;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.ok { background: #34C759; }
    .toast.err { background: #FF3B30; }

    @media (max-width: 600px) {
      header { padding: 0 16px; }
      main { padding: 20px 16px 40px; }
      .auth-card { padding: 28px 22px; }
    }
  </style>
</head>
<body>

<!-- ====== LOGIN ====== -->
<div class="screen active" id="loginScreen" style="align-items:center;justify-content:center;min-height:100vh;padding:20px">
  <div class="auth-card">
    <div class="auth-logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
    </div>
    <div class="auth-title">Nástroje Drozda</div>
    <div class="auth-sub">Interní aplikace — přihlášení</div>
    <input type="password" id="loginPwd" placeholder="Heslo" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-red btn-red-full" onclick="doLogin()">Přihlásit se</button>
    <div class="error-msg" id="loginErr"></div>
  </div>
</div>

<!-- ====== SETUP (první spuštění) ====== -->
<div class="screen" id="setupScreen" style="align-items:center;justify-content:center;min-height:100vh;padding:20px">
  <div class="auth-card" style="max-width:440px">
    <div class="auth-logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
    </div>
    <div class="auth-title">Prvotní nastavení</div>
    <div class="auth-sub">Nastavíš jednou, pak jen heslo</div>

    <div class="field-group">
      <label class="field-label">GitHub Personal Access Token</label>
      <input type="password" id="setupGhToken" placeholder="ghp_xxxxxxxxxxxx">
      <div class="field-hint">Oprávnění: Contents (read & write)</div>
    </div>
    <div class="field-group">
      <label class="field-label">Claude API klíč</label>
      <input type="password" id="setupClaudeKey" placeholder="sk-ant-xxxxxxxxxxxx">
      <div class="field-hint">Pro automatické generování metadat</div>
    </div>
    <div class="field-group">
      <label class="field-label">Heslo pro rozcestník</label>
      <input type="password" id="setupPwd" placeholder="Zvol heslo" style="margin-bottom:8px">
      <input type="password" id="setupPwd2" placeholder="Heslo znovu pro ověření">
    </div>

    <button class="btn btn-red btn-red-full" onclick="doSetup()">Uložit a spustit</button>
    <div class="error-msg" id="setupErr"></div>
  </div>
</div>

<!-- ====== HLAVNÍ APLIKACE ====== -->
<div class="screen" id="appScreen" style="flex-direction:column;min-height:100vh">
  <header>
    <div class="header-brand">
      <div class="header-icon-box">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
      </div>
      <span class="header-title">Nástroje Drozda</span>
    </div>
    <div class="header-actions">
      <button class="btn-icon-sm" onclick="doRefresh()" title="Obnovit">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
      <button class="btn-icon-sm" onclick="openSettings()" title="Nastavení">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/>
        </svg>
      </button>
      <button class="btn-add-app" onclick="openUpload()">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Přidat aplikaci
      </button>
    </div>
  </header>

  <main style="flex:1">
    <div class="section-bar">
      <span class="section-label">Všechny nástroje</span>
      <span class="apps-count-badge" id="appsCount">—</span>
    </div>
    <div class="apps-grid" id="appsGrid"></div>
  </main>
</div>

<!-- ====== UPLOAD MODAL ====== -->
<div class="overlay" id="uploadOverlay">
  <div class="modal modal-lg">
    <div class="modal-head">
      <span class="modal-head-title">Přidat novou aplikaci</span>
      <button class="modal-close" onclick="closeUpload()">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="uploadBody"></div>
    <div class="modal-foot" id="uploadFoot"></div>
  </div>
</div>

<!-- ====== SETTINGS MODAL ====== -->
<div class="overlay" id="settingsOverlay">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-head-title">Nastavení</span>
      <button class="modal-close" onclick="closeSettings()">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="settings-section">
        <div class="settings-section-title">GitHub Personal Access Token</div>
        <div class="inline-row">
          <input type="password" id="sGhToken" placeholder="ghp_xxxxxxxxxxxx">
          <button class="btn btn-ghost" onclick="saveGhToken()">Uložit</button>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-section-title">Claude API klíč</div>
        <div class="inline-row">
          <input type="password" id="sClaudeKey" placeholder="sk-ant-xxxxxxxxxxxx">
          <button class="btn btn-ghost" onclick="saveClaudeKey()">Uložit</button>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-section-title">Změna hesla</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <input type="password" id="sNewPwd" placeholder="Nové heslo">
          <input type="password" id="sNewPwd2" placeholder="Nové heslo znovu">
          <button class="btn btn-red" style="margin-top:4px" onclick="changePwd()">Změnit heslo</button>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="doLogout()">Odhlásit se</button>
      <button class="btn btn-dark" onclick="closeSettings()">Hotovo</button>
    </div>
  </div>
</div>

<!-- ====== TOAST ====== -->
<div class="toast" id="toast"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const GH_OWNER  = 'drozdanaradi';
const GH_REPO   = 'apps';
const GH_BRANCH = 'main';
const BASE_URL  = `https://${GH_OWNER}.github.io/${GH_REPO}`;

const COLORS = [
  { bg: '#EBF5FF', fg: '#007AFF' },  // blue
  { bg: '#EDFAF1', fg: '#34C759' },  // green
  { bg: '#FFF3E0', fg: '#FF9500' },  // orange
  { bg: '#F3ECFF', fg: '#AF52DE' },  // purple
  { bg: '#E8F9FF', fg: '#5AC8FA' },  // teal
  { bg: '#FFE8E8', fg: '#D40000' },  // red
];

const ICONS_LIST = [
  'bell','bar-chart-2','package','file-text','tag','layout-dashboard',
  'search','printer','image','mail','shopping-cart','truck','users',
  'calendar','clipboard-list','database','cpu','zap','wrench','star',
  'layers','grid','box','archive','book','briefcase','calculator',
  'camera','check-square','clock','code','dollar-sign','edit','eye',
  'filter','folder','globe','key','list','lock','map','monitor',
  'percent','phone','pie-chart','save','send','shield','sliders',
  'smartphone','table','target','terminal','trending-up','upload',
  'user','tool','refresh-cw','hash'
];

// ─── CRYPTO ───────────────────────────────────────────────────────────────────
async function hashPwd(pwd) {
  const buf = await crypto.subtle.digest('SHA-256',
    new TextEncoder().encode(pwd + 'drozdanaradi-2024'));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ─── AUTH ─────────────────────────────────────────────────────────────────────
async function doLogin() {
  const pwd = el('loginPwd').value;
  if (!pwd) return;
  const h = await hashPwd(pwd);
  if (h === ls('app_password')) {
    ls('session', Date.now().toString());
    showApp();
  } else {
    el('loginErr').textContent = 'Nesprávné heslo.';
  }
}

async function doSetup() {
  const ghToken   = el('setupGhToken').value.trim();
  const claudeKey = el('setupClaudeKey').value.trim();
  const pwd       = el('setupPwd').value;
  const pwd2      = el('setupPwd2').value;
  const errEl     = el('setupErr');

  if (!ghToken || !claudeKey || !pwd) { errEl.textContent = 'Vyplň všechna pole.'; return; }
  if (pwd !== pwd2)                    { errEl.textContent = 'Hesla se neshodují.'; return; }

  const h = await hashPwd(pwd);
  ls('gh_token',    ghToken);
  ls('claude_key',  claudeKey);
  ls('app_password', h);
  ls('session',     Date.now().toString());
  showApp();
}

async function changePwd() {
  const p1 = el('sNewPwd').value;
  const p2 = el('sNewPwd2').value;
  if (!p1 || p1 !== p2) { toast('Hesla se neshodují', 'err'); return; }
  ls('app_password', await hashPwd(p1));
  el('sNewPwd').value = el('sNewPwd2').value = '';
  toast('Heslo změněno', 'ok');
}

function doLogout() {
  localStorage.removeItem('session');
  closeSettings();
  show('loginScreen');
  hide('appScreen');
}

function saveGhToken()   { const v = el('sGhToken').value.trim();   if (!v) return; ls('gh_token',   v); el('sGhToken').value   = ''; toast('GitHub token uložen', 'ok'); }
function saveClaudeKey() { const v = el('sClaudeKey').value.trim(); if (!v) return; ls('claude_key', v); el('sClaudeKey').value = ''; toast('Claude API klíč uložen', 'ok'); }

// ─── GITHUB API ───────────────────────────────────────────────────────────────
async function ghFetch(path, method = 'GET', body = null) {
  const opts = {
    method,
    headers: {
      'Authorization': `token ${ls('gh_token')}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  return fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`, opts);
}

function b64enc(str) { return btoa(unescape(encodeURIComponent(str))); }
function b64dec(str) { return decodeURIComponent(escape(atob(str.replace(/\n/g, '')))); }

async function getAppsJson() {
  const res = await ghFetch('apps.json');
  if (res.status === 404) return { data: { apps: [] }, sha: null };
  if (!res.ok) throw new Error('Chyba při čtení apps.json');
  const file = await res.json();
  return { data: JSON.parse(b64dec(file.content)), sha: file.sha };
}

async function putAppsJson(data, sha, msg) {
  const body = { message: msg, content: b64enc(JSON.stringify(data, null, 2)), branch: GH_BRANCH };
  if (sha) body.sha = sha;
  const res = await ghFetch('apps.json', 'PUT', body);
  if (!res.ok) { const e = await res.json(); throw new Error(e.message || 'Chyba zápisu apps.json'); }
  return res.json();
}

async function putFile(filename, content, msg) {
  const check = await ghFetch(filename);
  let sha = null;
  if (check.ok) { const ex = await check.json(); sha = ex.sha; }
  const body = { message: msg, content: b64enc(content), branch: GH_BRANCH };
  if (sha) body.sha = sha;
  const res = await ghFetch(filename, 'PUT', body);
  if (!res.ok) { const e = await res.json(); throw new Error(e.message || 'Chyba nahrávání souboru'); }
  return res.json();
}

// ─── CLAUDE API ───────────────────────────────────────────────────────────────
async function analyzeApp(html, filename) {
  const truncated = html.length > 14000 ? html.slice(0, 14000) + '\n... [zkráceno]' : html;

  const prompt = `Analyzuj tuto HTML aplikaci. Vrať POUZE JSON, žádný jiný text, žádné backticky.

Soubor: ${filename}
\`\`\`html
${truncated}
\`\`\`

JSON formát:
{
  "name": "Krátký výstižný název v češtině (max 40 znaků)",
  "description": "Popis co aplikace dělá a k čemu slouží (max 110 znaků, česky, bez teček na konci)",
  "icon": "JEDNA ikona z tohoto seznamu: ${ICONS_LIST.join(', ')}",
  "colorIndex": číslo 0 až 5
}`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': ls('claude_key'),
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 400,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!res.ok) throw new Error('Claude API selhalo');
  const data = await res.json();
  const text = data.content[0].text.replace(/```json|```/g, '').trim();
  return JSON.parse(text);
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function cardHtml(app) {
  const c   = COLORS[app.colorIndex % COLORS.length];
  const url = app.url || `${BASE_URL}/${app.filename}`;
  const dt  = app.updated ? fmtDate(app.updated) : '—';
  const num = String(app.id).padStart(2, '0');

  return `
  <div class="app-card">
    <div class="card-head">
      <div class="app-icon-box" style="background:${c.bg}">
        <i data-lucide="${app.icon || 'box'}" style="width:22px;height:22px;color:${c.fg};stroke-width:1.8"></i>
      </div>
      <span class="app-num">#${num}</span>
    </div>
    <div class="app-name">${esc(app.name)}</div>
    <div class="app-desc">${esc(app.description)}</div>
    <div class="card-foot">
      <span class="app-date">Aktualizováno ${dt}</span>
      <a href="${url}" target="_blank" class="btn btn-dark">Otevřít</a>
    </div>
  </div>`;
}

function emptyHtml() {
  return `
  <div class="empty-state">
    <div class="empty-icon">
      <i data-lucide="layout-grid" style="width:26px;height:26px;stroke-width:1.5"></i>
    </div>
    <h3>Zatím žádné nástroje</h3>
    <p>Klikni na „Přidat aplikaci" a nahraj první HTML soubor</p>
  </div>`;
}

function fmtDate(s) {
  return new Date(s).toLocaleDateString('cs-CZ', { day:'numeric', month:'numeric', year:'numeric' });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function doRefresh() {
  el('appsCount').textContent = 'Načítám…';
  try {
    const { data } = await getAppsJson();
    const apps = data.apps || [];
    const g = el('appsGrid');
    g.innerHTML = apps.length ? apps.map(cardHtml).join('') : emptyHtml();
    lucide.createIcons();
    const n = apps.length;
    el('appsCount').textContent = `${n} ${n === 1 ? 'nástroj' : n < 5 ? 'nástroje' : 'nástrojů'}`;
  } catch(e) {
    el('appsCount').textContent = 'Chyba';
    toast('Chyba načítání: ' + e.message, 'err');
  }
}

// ─── UPLOAD FLOW ──────────────────────────────────────────────────────────────
let up = { file: null, content: null, meta: null };

function openUpload() {
  up = { file: null, content: null, meta: null };
  renderDropZone();
  el('uploadOverlay').classList.add('open');
}

function closeUpload() { el('uploadOverlay').classList.remove('open'); }

function renderDropZone() {
  el('uploadBody').innerHTML = `
    <div class="drop-zone" id="dz" onclick="el('fi').click()">
      <i data-lucide="upload-cloud" style="width:36px;height:36px;stroke-width:1.4"></i>
      <h4>Přetáhni HTML soubor sem</h4>
      <p>nebo klikni pro výběr ze zařízení</p>
      <input type="file" id="fi" accept=".html,.htm" style="display:none" onchange="onFileSelect(this.files[0])">
    </div>`;
  el('uploadFoot').innerHTML = `<button class="btn btn-ghost" onclick="closeUpload()">Zrušit</button>`;
  lucide.createIcons();

  const dz = el('dz');
  dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', ()  => dz.classList.remove('over'));
  dz.addEventListener('drop',      e  => { e.preventDefault(); dz.classList.remove('over'); onFileSelect(e.dataTransfer.files[0]); });
}

async function onFileSelect(file) {
  if (!file || !/\.(html|htm)$/i.test(file.name)) { toast('Vyber HTML soubor', 'err'); return; }
  up.file = file;

  el('uploadBody').innerHTML = `
    <div class="state-center">
      <div class="spinner"></div>
      <div class="state-title">Claude analyzuje aplikaci…</div>
      <div class="state-sub">Generuji název, popis a ikonu</div>
    </div>`;
  el('uploadFoot').innerHTML = '';

  const content = await readText(file);
  up.content = content;

  try {
    up.meta = await analyzeApp(content, file.name);
  } catch(e) {
    up.meta = { name: '', description: '', icon: 'box', colorIndex: 0 };
    toast('Claude API selhalo — vyplň ručně', 'err');
  }

  renderEditForm(file.name, up.meta);
}

function renderEditForm(filename, meta) {
  const c = COLORS[meta.colorIndex % COLORS.length];

  el('uploadBody').innerHTML = `
    <div class="field-group">
      <label class="field-label">Soubor</label>
      <div style="font-size:13px;color:var(--text-secondary);padding:4px 0">${esc(filename)}</div>
    </div>

    <div class="field-group">
      <label class="field-label">Ikona (generováno Claudem)</label>
      <div class="icon-preview-row">
        <div class="icon-preview-box" id="iconBox" style="background:${c.bg}">
          <i data-lucide="${meta.icon}" style="width:22px;height:22px;color:${c.fg};stroke-width:1.8"></i>
        </div>
        <div>
          <div class="icon-preview-name">${meta.icon}</div>
          <div class="icon-preview-sub">Lucide icon · barevné schéma ${meta.colorIndex}</div>
        </div>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">Název aplikace</label>
      <input type="text" id="eName" value="${esc(meta.name)}" maxlength="60" placeholder="Název">
    </div>

    <div class="field-group">
      <label class="field-label">Popis</label>
      <textarea id="eDesc" maxlength="130" style="min-height:66px">${esc(meta.description)}</textarea>
    </div>

    <div class="field-group">
      <label class="field-label">Název souboru v repozitáři</label>
      <input type="text" id="eSlug" value="${esc(filename)}" placeholder="soubor.html">
    </div>`;

  el('uploadFoot').innerHTML = `
    <button class="btn btn-ghost" onclick="closeUpload()">Zrušit</button>
    <button class="btn btn-red" onclick="doUpload()">
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Nahrát na GitHub
    </button>`;

  lucide.createIcons();
}

async function doUpload() {
  const name = el('eName').value.trim();
  const desc = el('eDesc').value.trim();
  const slug = el('eSlug').value.trim();

  if (!name || !desc || !slug) { toast('Vyplň všechna pole', 'err'); return; }

  el('uploadBody').innerHTML = `
    <div class="state-center">
      <div class="spinner"></div>
      <div class="state-title">Nahrávám na GitHub…</div>
      <div class="state-sub">Prosím čekej</div>
    </div>`;
  el('uploadFoot').innerHTML = '';

  try {
    await putFile(slug, up.content, `Přidána aplikace: ${name}`);

    const { data, sha } = await getAppsJson();
    const apps = data.apps || [];
    const nextId = apps.length > 0 ? Math.max(...apps.map(a => a.id)) + 1 : 1;

    apps.push({
      id:          nextId,
      name,
      description: desc,
      icon:        up.meta?.icon || 'box',
      colorIndex:  up.meta?.colorIndex ?? (nextId - 1) % COLORS.length,
      filename:    slug,
      url:         `${BASE_URL}/${slug}`,
      updated:     new Date().toISOString().split('T')[0]
    });

    await putAppsJson({ apps }, sha, `apps.json: přidána ${name}`);

    closeUpload();
    toast(`„${name}" nahrána!`, 'ok');
    await doRefresh();

  } catch(e) {
    toast('Chyba: ' + e.message, 'err');
    renderEditForm(up.file.name, up.meta || { name:'', description:'', icon:'box', colorIndex:0 });
  }
}

function readText(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = e => res(e.target.result);
    r.onerror = rej;
    r.readAsText(file, 'UTF-8');
  });
}

// ─── SETTINGS ─────────────────────────────────────────────────────────────────
function openSettings()  { el('settingsOverlay').classList.add('open'); }
function closeSettings() { el('settingsOverlay').classList.remove('open'); }

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function el(id)       { return document.getElementById(id); }
function ls(k, v)     { if (v !== undefined) { localStorage.setItem(k, v); return v; } return localStorage.getItem(k); }
function show(id)     { el(id).classList.add('active'); }
function hide(id)     { el(id).classList.remove('active'); }

let _tt;
function toast(msg, type = '') {
  const t = el('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(_tt);
  _tt = setTimeout(() => t.classList.remove('show'), 3000);
}

function showApp() {
  ['loginScreen','setupScreen'].forEach(id => { const e = el(id); e.classList.remove('active'); e.style.display = 'none'; });
  el('appScreen').classList.add('active');
  el('appScreen').style.display = 'flex';
  doRefresh();
}

// ─── KEYBOARD ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeUpload(); closeSettings(); }
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
(async () => {
  const hasPwd = ls('app_password');

  if (!hasPwd) {
    el('loginScreen').style.display = 'none';
    el('loginScreen').classList.remove('active');
    el('setupScreen').style.display  = 'flex';
    el('setupScreen').classList.add('active');
    return;
  }

  const session = ls('session');
  if (session && (Date.now() - parseInt(session)) < 86400000) {
    el('loginScreen').style.display = 'none';
    el('loginScreen').classList.remove('active');
    showApp();
    return;
  }

  localStorage.removeItem('session');
  // Login screen is already shown by default
})();
</script>
